name: skala_mobile
description: "سکاڵا - سەکۆی کۆمەڵایەتی بۆ سکاڵاکانی شار"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Networking & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Images & Media
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  video_player: ^2.8.2
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  
  # Internationalization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/